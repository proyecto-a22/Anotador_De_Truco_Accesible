<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anotador de Truco Accesible</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:linear-gradient(to bottom,#2e2b26,#3f3a32);
  color:#f5f5dc;
  text-align:center;
}
h1{margin-top:15px;}
.section{
  margin:10px;
  border:2px solid #8b6f47;
  border-radius:8px;
}
.section button.header{
  width:100%;
  padding:12px;
  background:#5c4a2f;
  color:white;
  font-size:18px;
  border:none;
  cursor:pointer;
}
.content{
  display:none;
  padding:10px;
  background:#4a4033;
}
button,input{
  font-size:18px;
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
}
button{
  background:#8b6f47;
  color:white;
  cursor:pointer;
}
button:disabled{
  background:#555;
}
.score-row{
  display:flex;
  justify-content:space-around;
  align-items:center;
  margin-top:25px;
}
.score-side{
  display:flex;
  align-items:center;
  gap:12px;
}
.score-number{
  font-size:30px;
  font-weight:bold;
  min-width:45px;
}
.hidden{display:none;}
#winnerMessage{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}

/* bienvenida */
#welcome{
  position:fixed;
  inset:0;
  background:#2e2b26;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* sliders */
.slider-container{
  margin-top:10px;
}
input[type="range"]{
  width:80%;
}
</style>
</head>
<body>

<div id="welcome">
  <h1>Anotador de Truco</h1>
  <p>Bienvenido. Presioná el botón para comenzar.</p>
  <button id="entrar">Entrar</button>
</div>

<h1>Anotador de Truco</h1>

<div id="liveRegion" aria-live="assertive" style="position:absolute;left:-9999px;"></div>

<div id="menu" class="hidden">

<div class="section">
<button type="button" class="header" aria-expanded="false">Juego</button>
<div class="content">
<label><input type="radio" name="modo" value="1"> 1 vs 1</label><br>
<label><input type="radio" name="modo" value="2"> 2 vs 2</label><br>
<label><input type="radio" name="modo" value="3"> 3 vs 3</label>
</div>
</div>

<button type="button" id="verNovedades">Novedades</button>

<div class="section">
<button type="button" class="header" aria-expanded="false">Más opciones</button>
<div class="content"><br>

<label><input type="checkbox" id="voz"> Indicaciones en voz alta</label><br>

<label><input type="checkbox" id="sonidos" checked> Sonidos del sistema</label>
<div class="slider-container">
<input type="range" id="volSonidos" min="0" max="100" value="50" disabled>
</div>

<label><input type="checkbox" id="musicaMenu" checked> Música en menú</label>
<div class="slider-container">
<input type="range" id="volMenu" min="0" max="100" value="50" disabled>
</div>

<label><input type="checkbox" id="musicaPartida"> Música durante partida</label>
<div class="slider-container">
<input type="range" id="volPartida" min="0" max="100" value="50" disabled>
</div>

</div>
</div>

<button type="button" id="iniciarConfig" disabled>Validar</button>
</div>

<div id="configEquipos" class="hidden">
<h2>Iniciales</h2>
<input maxlength="20" id="equipo1" placeholder="Equipo A">
<input maxlength="20" id="equipo2" placeholder="Equipo B">
<br>
<button type="button" id="comenzarPartida" disabled>Iniciar partida</button>
</div>

<div id="pantallaNovedades" class="hidden">
  <h2>Novedades</h2>

  <pre id="contenidoNovedades" style="white-space:pre-wrap;"></pre>

  <button type="button" id="volverMenu">Volver</button>
</div>

<div id="partida" class="hidden">

<div class="score-row">

<div class="score-side">
<button type="button" id="menos1" aria-label="Restar un punto al equipo uno">-1</button>
<button type="button" id="mas1" aria-label="Sumar un punto al equipo uno">+1</button>
<div id="score1" class="score-number" aria-live="polite">0</div>
</div>

<div class="score-side">
<div id="score2" class="score-number" aria-live="polite">0</div>
<button type="button" id="mas2" aria-label="Sumar un punto al equipo dos">+1</button>
<button type="button" id="menos2" aria-label="Restar un punto al equipo dos">-1</button>
</div>

</div>

<button type="button" id="leerMarcador">Leer marcadores</button>

<div id="winnerMessage"></div>
<button type="button" id="nuevaPartida" class="hidden">Nueva partida</button>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let score1=0, score2=0;
let nombre1="", nombre2="";
let audioCtx=null, masterGain=null;
let vozSeleccionada=null;
let buenas1=false, buenas2=false;
let audioDesbloqueado=false;

/* AUDIO RANDOM */
const tracks=[
 "music1.ogg",
 "music2.ogg",
 "music3.ogg",
 "music4.ogg",
 "music5.ogg",
 "music6.ogg"
];
let musicaMenuAudio = new Audio();
let musicaPartidaAudio = new Audio();

function randomTrack(){
  return tracks[Math.floor(Math.random()*tracks.length)];
}

function playRandom(audio){
  audio.src = randomTrack();
  audio.play();
}

function loopRandom(audio){
  audio.onended = ()=> playRandom(audio);
}

/* MUSICA MENU */
function iniciarMusicaMenu(){
  playRandom(musicaMenuAudio);
  loopRandom(musicaMenuAudio);
}

function detenerMusicaMenu(){
  musicaMenuAudio.pause();
}

/* MUSICA PARTIDA */
function iniciarMusicaPartida(){
  playRandom(musicaPartidaAudio);
  loopRandom(musicaPartidaAudio);
}

function detenerMusicaPartida(){
  musicaPartidaAudio.pause();
}

/* sliders enable/disable + volumen */
function vincularCheckboxSlider(checkId, sliderId, audio){
  const check = document.getElementById(checkId);
  const slider = document.getElementById(sliderId);

  function actualizar(){
    slider.disabled = !check.checked;

    if(check.checked){
      audio.volume = slider.value/100;
    }else{
      audio.pause();
    }
  }

  check.addEventListener("change", ()=>{
    actualizar();

    if(checkId === "musicaMenu"){
      if(check.checked) iniciarMusicaMenu();
      else detenerMusicaMenu();
    }

    if(checkId === "musicaPartida"){
      if(check.checked) iniciarMusicaPartida();
      else detenerMusicaPartida();
    }
  });

  slider.addEventListener("input", ()=>{
    audio.volume = slider.value/100;
  });

  actualizar();
}

vincularCheckboxSlider("sonidos","volSonidos", new Audio());
vincularCheckboxSlider("musicaMenu","volMenu", musicaMenuAudio);
vincularCheckboxSlider("musicaPartida","volPartida", musicaPartidaAudio);

const btnNovedades = document.getElementById("verNovedades");
const pantallaNovedades = document.getElementById("pantallaNovedades");
const contenidoNovedades = document.getElementById("contenidoNovedades");

btnNovedades.addEventListener("click", ()=>{
  desbloquearAudio();

  document.getElementById("menu").classList.add("hidden");
  pantallaNovedades.classList.remove("hidden");

  fetch("novedades.txt")
    .then(res => res.text())
    .then(texto => {
      contenidoNovedades.textContent = texto;
    })
    .catch(()=>{
      contenidoNovedades.textContent = "No se pudieron cargar las novedades.";
    });
});

document.getElementById("volverMenu").addEventListener("click", ()=>{
  pantallaNovedades.classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
});
 
/* bienvenida */
document.getElementById("entrar").addEventListener("click", ()=>{
  desbloquearAudio();

  document.getElementById("welcome").style.display="none";
  document.getElementById("menu").classList.remove("hidden");
  /*  forzar música de menú si está activada */
  if(document.getElementById("musicaMenu").checked){
    iniciarMusicaMenu();

    const slider = document.getElementById("volMenu");
    musicaMenuAudio.volume = slider.value / 100;
  }
});

/* vibración accesible */
function vibrar(p){
 if(navigator.vibrate){
  navigator.vibrate(p);
 }
}

/* Región ARIA */
function anunciar(texto){
  const region = document.getElementById("liveRegion");
  region.textContent = "";
  setTimeout(()=>{ region.textContent = texto; },50);
}

function anunciarMarcador(texto){
  if(document.getElementById("voz").checked){
    hablar(texto);
  }else{
    anunciar(texto);
  }
}
/* Audio base */
function desbloquearAudio(){
  if(audioDesbloqueado) return;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.2;
    masterGain.connect(audioCtx.destination);
    if(audioCtx.state === "suspended") audioCtx.resume();
    audioDesbloqueado = true;
  }catch(e){}
}

/* Voz */
function cargarVoces(){
  if(!('speechSynthesis' in window)) return;
  let voces = speechSynthesis.getVoices();
  if(!voces.length){
    setTimeout(cargarVoces,200);
    return;
  }
  vozSeleccionada =
    voces.find(v=>v.lang.includes("es-AR")) ||
    voces.find(v=>v.lang.includes("es")) ||
    null;
}
if('speechSynthesis' in window){
  cargarVoces();
  speechSynthesis.onvoiceschanged = cargarVoces;
}

function hablar(texto){
  if(!document.getElementById("voz").checked) return;
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  let msg=new SpeechSynthesisUtterance(texto);
  if(vozSeleccionada) msg.voice=vozSeleccionada;
  msg.rate=0.95;
  speechSynthesis.speak(msg);
}

/* Acordeón + teclado */
const headers = Array.from(document.querySelectorAll(".header"));

function abrirMenu(btn){
  const content = btn.nextElementSibling;

  document.querySelectorAll(".content").forEach(c=>c.style.display="none");
  document.querySelectorAll(".header").forEach(h=>h.setAttribute("aria-expanded","false"));

  content.style.display="block";
  btn.setAttribute("aria-expanded","true");

  const foco = content.querySelector("input,button");
  if(foco) foco.focus();
}

headers.forEach((btn, index)=>{
  btn.addEventListener("click", ()=>{
    desbloquearAudio();
    const abierto = btn.getAttribute("aria-expanded")==="true";
    if(!abierto){
      abrirMenu(btn);
    }
  });

  btn.addEventListener("keydown", (e)=>{
    if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      btn.click();
    }

    if(e.key === "ArrowDown"){
      e.preventDefault();
      headers[(index+1)%headers.length].focus();
    }

    if(e.key === "ArrowUp"){
      e.preventDefault();
      headers[(index-1+headers.length)%headers.length].focus();
    }
  });
});

/* Flujo */
const iniciarBtn = document.getElementById("iniciarConfig");
const radiosJuego = document.querySelectorAll('input[name="modo"]');
const comenzarBtn = document.getElementById("comenzarPartida");
const input1 = document.getElementById("equipo1");
const input2 = document.getElementById("equipo2");

function revisarOpcionesJuego() {
  let algunaMarcada = Array.from(radiosJuego).some(r => r.checked);
  iniciarBtn.disabled = !algunaMarcada;
}
revisarOpcionesJuego();

radiosJuego.forEach(r => r.addEventListener("change", ()=>{
  revisarOpcionesJuego();
  revisarCamposIniciales();
}));
function revisarCamposIniciales(){

  const modo = document.querySelector('input[name="modo"]:checked')?.value;

  if(modo === "1"){
    input1.maxLength = 20;
    input2.maxLength = 20;
    comenzarBtn.disabled = !(input1.value.trim() && input2.value.trim());
  }

  else if(modo === "2"){
    input1.maxLength = 4;
    input2.maxLength = 4;
    comenzarBtn.disabled = !(input1.value.trim() && input2.value.trim());
  }

  else if(modo === "3"){
    input1.maxLength = 6;
    input2.maxLength = 6;
    comenzarBtn.disabled = !(input1.value.trim() && input2.value.trim());
  }

  else{
    comenzarBtn.disabled = true;
  }
}

input1.addEventListener("input", revisarCamposIniciales);
input2.addEventListener("input", revisarCamposIniciales);

document.getElementById("iniciarConfig").addEventListener("click", ()=>{
  desbloquearAudio();
  revisarCamposIniciales();

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("configEquipos").classList.remove("hidden");

  if(document.getElementById("musicaMenu").checked){
    detenerMusicaMenu();
  }
});

document.getElementById("comenzarPartida").addEventListener("click", ()=>{
  desbloquearAudio();

  nombre1 = input1.value.trim() || "Equipo A";
  nombre2 = input2.value.trim() || "Equipo B";

  document.getElementById("configEquipos").classList.add("hidden");
  document.getElementById("partida").classList.remove("hidden");

  if(document.getElementById("musicaPartida").checked){
    iniciarMusicaPartida();
  }

  document.getElementById("mas1").focus();
});

/* MARCADOR */

function actualizar(){
  score1=Math.max(0,Math.min(30,score1));
  score2=Math.max(0,Math.min(30,score2));

  document.getElementById("score1").textContent=score1;
  document.getElementById("score2").textContent=score2;

  let anuncioEspecial=false;

  if(score1>=16 && !buenas1){
    buenas1=true;
    anunciarMarcador(nombre1+" está en las buenas con "+score1+" puntos.");
    anuncioEspecial=true;
  }
  if(score1<16) buenas1=false;

  if(score2>=16 && !buenas2){
    buenas2=true;
    anunciarMarcador(nombre2+" está en las buenas con "+score2+" puntos.");
    anuncioEspecial=true;
  }
  if(score2<16) buenas2=false;

  if(score1>=30 || score2>=30){
    let ganador=score1>=30?nombre1:nombre2;

    document.getElementById("winnerMessage").textContent=
      ganador+" ganó la partida con 30 puntos.";

    document.getElementById("nuevaPartida").classList.remove("hidden");

    document.querySelectorAll("#partida button").forEach(b=>{
      if(b.id!=="nuevaPartida") b.disabled=true;
    });

    vibrar([200,100,200]);

    anunciarMarcador("Fin de partida. Ganador "+ganador+" con 30 puntos.");
    anuncioEspecial=true;
  }

  return anuncioEspecial;
}

function cambiarPuntaje(equipo, tipo){
  desbloquearAudio();

  let anterior = equipo===1?score1:score2;

  if(equipo===1){
    score1 += tipo==="mas"?1:-1;
  }else{
    score2 += tipo==="mas"?1:-1;
  }

  let eventoEspecial = actualizar();
  let actual = equipo===1?score1:score2;

  if(actual!==anterior && !eventoEspecial){
    let nombre = equipo===1?nombre1:nombre2;
    anunciarMarcador(nombre+" tiene "+actual+" puntos.");
    vibrar(50);
  }
}

document.getElementById("mas1").addEventListener("click", ()=>cambiarPuntaje(1,"mas"));
document.getElementById("menos1").addEventListener("click", ()=>cambiarPuntaje(1,"menos"));
document.getElementById("mas2").addEventListener("click", ()=>cambiarPuntaje(2,"mas"));
document.getElementById("menos2").addEventListener("click", ()=>cambiarPuntaje(2,"menos"));

document.getElementById("leerMarcador").addEventListener("click", ()=>{
  desbloquearAudio();
  anunciarMarcador(nombre1+" tiene "+score1+" puntos. "+nombre2+" tiene "+score2+" puntos.");
});

document.getElementById("nuevaPartida").addEventListener("click", ()=>{
  score1=0;
  score2=0;
  buenas1=false;
  buenas2=false;

  document.getElementById("winnerMessage").textContent="";
  document.getElementById("nuevaPartida").classList.add("hidden");

  document.querySelectorAll("#partida button").forEach(b=>{
    b.disabled=false;
  });

  if(document.getElementById("musicaPartida").checked){
    detenerMusicaPartida();
    iniciarMusicaPartida();
  }

  actualizar();
});

});
</script>

</body>
</html>
